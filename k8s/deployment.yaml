apiVersion: apps/v1
kind: Deployment
metadata:
  name: fp-survival
  namespace: fp-survival
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fp-survival
  template:
    metadata:
      labels:
        app: fp-survival
    spec:
      containers:
        - name: web
          image: ghcr.io/markkampstra/fp-survival:f41217c12723665f28ecc3595e31a6595f20dfc5
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
