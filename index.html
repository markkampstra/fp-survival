<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP Survival</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: sans-serif; color: #fff; }
    canvas#game { display: none; width: 100%; height: 100%; }

    #splash {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(180deg, #0c1a2e 0%, #1a3a2a 40%, #2a4a20 70%, #1a2a15 100%);
      position: relative; overflow: hidden;
    }
    #splash .stars {
      position: absolute; top: 0; left: 0; width: 100%; height: 50%;
      background: radial-gradient(1px 1px at 20% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
                  radial-gradient(1px 1px at 50% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
                  radial-gradient(1px 1px at 80% 8%, rgba(255,255,255,0.4) 0%, transparent 100%),
                  radial-gradient(1px 1px at 10% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
                  radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
                  radial-gradient(1px 1px at 40% 5%, rgba(255,255,255,0.4) 0%, transparent 100%),
                  radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,0.3) 0%, transparent 100%);
    }
    #splash h1 {
      font-size: 3.5em; font-weight: 700; letter-spacing: 0.05em;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8), 0 0 40px rgba(50,120,80,0.3);
      margin-bottom: 0.2em; z-index: 1;
    }
    #splash .subtitle {
      font-size: 1.1em; opacity: 0.5; margin-bottom: 2.5em;
      letter-spacing: 0.15em; text-transform: uppercase; z-index: 1;
    }
    #splash .start-btn {
      padding: 14px 48px; font-size: 1.2em; font-weight: 600;
      background: rgba(46, 204, 113, 0.15); color: #2ecc71;
      border: 2px solid rgba(46, 204, 113, 0.4); border-radius: 6px;
      cursor: pointer; transition: all 0.3s ease;
      letter-spacing: 0.05em; z-index: 1;
    }
    #splash .start-btn:hover {
      background: rgba(46, 204, 113, 0.3);
      border-color: rgba(46, 204, 113, 0.7);
      box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
    }
    #splash .loading {
      display: none; z-index: 1;
      font-size: 1.1em; opacity: 0.6;
    }
    #splash .controls-hint {
      position: absolute; bottom: 30px;
      font-size: 0.8em; opacity: 0.3; text-align: center;
      line-height: 1.8; z-index: 1;
    }
    #splash .version {
      position: absolute; top: 15px; right: 20px;
      font-size: 0.7em; opacity: 0.2; z-index: 1;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="stars"></div>
    <div class="version">v0.3</div>
    <h1>FP Survival</h1>
    <div class="subtitle">A Tropical Island Survival Game</div>
    <button class="start-btn" id="start-btn">Start Game</button>
    <div class="loading" id="loading">Loading world...</div>
    <div class="controls-hint">
      WASD to move &bull; Shift to sprint &bull; Mouse to look<br>
      E to interact &bull; Left-click to attack &bull; Tab for inventory &bull; C for crafting
    </div>
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
